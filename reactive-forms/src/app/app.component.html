<h1>Basic of Reactive Forms</h1>

<form action="" method="post">
  <input type="text" [formControl]="name" placeholder="Enter your name" />
  <br />
  <br />
  <input
    type="text"
    [formControl]="password"
    placeholder="Enter your password"
  />
  <br />
  <br />
  <button type="button" (click)="displayValues()">Login</button>
  <h3>Name: {{ name.value }}</h3>
  <h3>Password: {{ password.value }}</h3>
</form>
