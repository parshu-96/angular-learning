<h1>If Else | Control workflow</h1>

<button (click)="display = !display">Toggle</button>

@if (display) {
  <div style="width: 200px; height: 200px; background-color: green"></div>
}

<hr />
<button (click)="toggleDiv = !toggleDiv">Toggle Two Divs</button>

@if (toggleDiv) {
  <div style="background-color: gold; width: 200px; height: 200px"></div>
} @else {
  <div style="background-color: red; width: 200px; height: 200px"></div>
}
