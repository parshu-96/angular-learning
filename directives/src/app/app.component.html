<h2>ngIf directive</h2>
<h2 *ngIf="show">Heading</h2>

<div *ngIf="login; else elseBlock">
  <a href="/">Logout</a>
</div>

<ng-template #elseBlock><a href="/">Login</a></ng-template>

<div *ngIf="block == 0">
  <h2>Block 0</h2>
</div>
<div *ngIf="block == 1">
  <h2>Block 1</h2>
</div>
<div *ngIf="block == 2">
  <h2>Block 2</h2>
</div>

<button (click)="updateBlock()">Update Block</button>
